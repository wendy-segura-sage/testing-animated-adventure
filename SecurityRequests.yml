name: "Security Review Request"
description: "Request a security review (threat model, pentest, design review) for significant changes."
title: "[Security Review] <product/service> - <short summary>"
labels: ["security-review", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        File a **Security Review Request** for any of the following:
        - New Product/Service
        - New Connectivity/Integrations (e.g. API interface, Third Party White Label)
        - Re-architecture of current service (e.g. VMs to Kubernetes)
        - Re-platform of current service (e.g. Data Center to Public Cloud)
        - Change of technology for the product (e.g. moving from Ruby to .NET)
        - Major code re-write / refactoring

        A security review may include: **threat model review**, **security design review**, **pentest planning**, and control verification.

  - type: checkboxes
    id: trigger
    attributes:
      label: Why are you requesting a security review?
      description: Select at least one. If none apply, explain in “Summary” why a review is still needed.
      options:
        - label: "New Product/Service"
        - label: "New Connectivity/Integrations (e.g., API interface, Third Party White Label)"
        - label: "Re-architecture of current service (e.g., VMs to Kubernetes)"
        - label: "Re-platform of current service (e.g., Data Center to Public Cloud)"
        - label: "Change of technology (e.g., moving from Ruby to .NET)"
        - label: "Major code re-write / refactoring"
        - label: "Other (describe below)"
    validations:
      required: true

  - type: input
    id: service
    attributes:
      label: Product / Service / Component
      description: What product, service, repo, or component is being changed?
      placeholder: "e.g., api-gateway, data-platform, mobile-app"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary of change
      description: What are you changing and what is the intended behavior?
      placeholder: "High-level description, scope, and key technical changes."
    validations:
      required: true

  - type: textarea
    id: links
    attributes:
      label: Links (PRs / design docs / diagrams)
      placeholder: "- PR: https://github.com/...\n- Design doc: ...\n- Architecture diagram: ..."
    validations:
      required: false

  - type: dropdown
    id: review_type
    attributes:
      label: What kind of security review do you need?
      options:
        - "Threat model review"
        - "Security design review"
        - "Pentest planning"
        - "Architecture review"
        - "Other (describe in Summary)"
    validations:
      required: true


  - type: dropdown
    id: timeline
    attributes:
      label: Release timeline
      options:
        - "ASAP (blocking release)"
        - "Within 1 week"
        - "Within 2 weeks"
        - "Not urgent / informational"
    validations:
      required: true